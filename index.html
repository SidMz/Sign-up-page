<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <form action="">
            <h1 style="text-align: center;">Sign Up</h1>
            <div class="holder">
                <!-- <label for="">First Name:</label> -->
                <input type="text" name="name" id="name" required placeholder="First name" >
            </div>
            <div class="holder">
                <!-- <label for="">Last Name:</label> -->
                <input type="text" name="name" id="name" required placeholder="Last name">
            </div>
            <div class="holder">
                <!-- <label for="">Password:</label> -->
                <input type="password" name="pwd" id="pwd" placeholder="Password must be of 8 characters" required>
            </div>
            <div class="holder">
                <!-- <label for="">Email:</label> -->
                <input type="email" name="email" id="email" placeholder="xyz@gmail.com" required>
            </div>
            <div class="button">
                <input type="submit" value="submit">
            </div>
            <div class="login">
                Have an account already? <a href="#">Log In</a>
            </div>
        </form>
    </div>
</body>
</html>
